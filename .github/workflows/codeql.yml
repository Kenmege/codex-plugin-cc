name: CodeQL

# Static analysis for JavaScript/TypeScript across the helper, schemas, and tests.
# Runs on every PR against main, on every push to main, and weekly to catch new
# rules shipped by GitHub against unchanged code. Findings surface under the
# repository's Security tab and as inline PR annotations.

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.mjs"
      - "**/*.js"
      - "**/*.cjs"
      - "**/*.ts"
      - "**/*.tsx"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/codeql.yml"
  push:
    branches: [main]
    paths:
      - "**/*.mjs"
      - "**/*.js"
      - "**/*.cjs"
      - "**/*.ts"
      - "**/*.tsx"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/codeql.yml"
  schedule:
    # Mondays 06:13 UTC. Off the top-of-hour to dodge GitHub's runner contention.
    - cron: "13 6 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Required so CodeQL can upload SARIF results to code scanning.
      security-events: write
      # Required for private repos / advanced setup; harmless on public.
      actions: read
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          languages: javascript-typescript
          # security-extended adds higher-signal queries beyond the default pack.
          # security-and-quality is broader; we hold to security-extended to keep
          # the noise floor low and the signal-to-effort ratio high.
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          category: "/language:javascript-typescript"
          # Fail the run if CodeQL itself errors. SARIF upload is best-effort
          # and does not gate merges by default; the security tab is the
          # primary surface for findings.
          upload: always
