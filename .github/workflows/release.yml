name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  release:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_PACKAGES_PUBLISH_ENABLED: ${{ vars.GH_PACKAGES_PUBLISH_ENABLED }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@kenmege"

      - name: Install dependencies
        run: npm ci

      - name: Run full check
        run: npm run check

      - name: Verify package contents
        run: npm run pack:check

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Release tag v${TAG_VERSION} does not match package.json version ${PACKAGE_VERSION}." >&2
            echo "Update package.json, package-lock.json, and .codex-plugin/plugin.json before pushing this tag." >&2
            exit 1
          fi

      - name: Publish to GitHub Packages
        if: ${{ env.GH_PACKAGES_PUBLISH_ENABLED == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm pkg set private=false
          npm publish --provenance --access restricted

      - name: Skip GitHub Packages publish
        if: ${{ env.GH_PACKAGES_PUBLISH_ENABLED != 'true' }}
        run: echo "GH_PACKAGES_PUBLISH_ENABLED is not 'true'. To publish to @kenmege/codex-plugin-cc, set the GitHub repository variable GH_PACKAGES_PUBLISH_ENABLED=true."
