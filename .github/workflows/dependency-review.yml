name: Dependency Review

# Blocks pull requests that introduce npm dependencies (direct or transitive) with
# known vulnerabilities at moderate severity or above, and surfaces a summary
# comment so reviewers can see exactly what changed in the dependency closure.
# Runs only on pull_request because GitHub's dependency-review API is scoped to
# diff head vs. base; weekly Dependabot + Scorecard cover the at-rest signal.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dep-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      # Required so the action can post the summary comment.
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Block merges that introduce moderate-or-higher CVEs. Reviewers can
          # still approve the PR; the gate exists so no one ships unknowingly.
          fail-on-severity: moderate
          # AGPL-3.0 forces network-service consumers into copyleft. Apache-2.0
          # downstream consumers cannot accept that without re-licensing, so
          # AGPL deps are blocked at the gate and must be discussed explicitly.
          deny-licenses: >-
            AGPL-1.0-only,
            AGPL-1.0-or-later,
            AGPL-3.0-only,
            AGPL-3.0-or-later
          comment-summary-in-pr: on-failure
          warn-only: false
