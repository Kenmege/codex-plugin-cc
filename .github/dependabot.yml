# Dependabot config for Kenmege/codex-plugin-cc.
#
# Scope: keep direct + transitive npm deps and pinned-by-SHA GitHub Actions current.
# Security advisories are emitted by Dependabot regardless of schedule and bypass the
# group settings below, so a weekly cadence does not delay vulnerability fixes.
#
# Reviewer expectations: every Dependabot PR runs through the same Pull Request CI
# matrix, CodeQL, OpenSSF Scorecard signal, and the four-reviewer setup as a human
# PR. Maintainer signs off the merge; auto-merge is intentionally not configured.

version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      npm-security:
        applies-to: security-updates
        update-types:
          - patch
          - minor
          - major

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(actions)
      include: scope
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      actions-security:
        applies-to: security-updates
        update-types:
          - patch
          - minor
          - major
