name: Feature request
description: Propose a new capability, review lane, schema field, or operator workflow.
title: "[feature] "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are read but not all are accepted. The plugin's scope is intentionally narrow: it runs Claude as a read-only adversarial reviewer over Codex/GPT-generated diffs. Requests that broaden scope beyond that core may be deferred or declined.

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What review situation does this enable that the plugin can't handle today?
    validations:
      required: true

  - type: dropdown
    id: review_lane
    attributes:
      label: Affected review lane(s)
      multiple: true
      options:
        - review
        - adversarial-review
        - elite-review
        - deep-review
        - security-review
        - setup / status / result / cancel
        - new lane (specify in description)
        - workflow / CI
        - schemas
        - documentation
    validations:
      required: true

  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior
      description: Concretely, what should the plugin do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Why isn't an existing flag, lane, or workflow change enough?

  - type: dropdown
    id: pr_intent
    attributes:
      label: Are you willing to send a PR?
      options:
        - "Yes, I'll send a PR"
        - "Maybe, with guidance"
        - "No, requesting only"
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and discussions for similar requests.
          required: true
        - label: This proposal does not require shipping API keys, tokens, or proprietary credentials in tests or fixtures.
          required: true
